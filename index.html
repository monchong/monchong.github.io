<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理財股市實驗室</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>融資維持率試算器</h2>
        <input type="number" id="price" placeholder="股票目前總市值">
        <input type="number" id="loan" placeholder="融資借款金額">
        <button onclick="calculate()">立即計算</button>
        <div id="result">-- %</div>
    </div>

    <script>
        function calculate() {
            const price = document.getElementById('price').value;
            const loan = document.getElementById('loan').value;
            if (loan > 0) {
                const ratio = ((price / loan) * 100).toFixed(2);
                let color = ratio < 140 ? 'red' : (ratio < 160 ? 'orange' : 'green');
                document.getElementById('result').innerHTML = `<span style="color:${color}">維持率：${ratio}%</span>`;
            } else {
                alert("借款金額必須大於 0 喔！");
            }
        }
    </script>
</body>
</html>
